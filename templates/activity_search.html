{% extends 'base.html' %}
{% block content %}
<h1>🎯 Discover Activities</h1>
<form method="GET" style="margin-bottom:25px">
  <div class="flex">
    <input type="text" name="q" value="{{query}}" placeholder="Search activities..." style="margin:0;flex:1">
    <select name="category" style="width:auto;margin:0">
      <option value="">All Categories</option>
      <option {% if category=='Sightseeing' %}selected{% endif %}>Sightseeing</option>
      <option {% if category=='Food' %}selected{% endif %}>Food</option>
      <option {% if category=='Adventure' %}selected{% endif %}>Adventure</option>
      <option {% if category=='Culture' %}selected{% endif %}>Culture</option>
      <option {% if category=='Shopping' %}selected{% endif %}>Shopping</option>
      <option {% if category=='Wellness' %}selected{% endif %}>Wellness</option>
    </select>
    <button type="submit" class="btn btn-primary">Search</button>
  </div>
</form>
<div class="grid-3">
{% for act in activities %}
<div class="card">
  <span class="badge badge-purple">{{act.category}}</span>
  <h3 style="margin:10px 0">{{act.name}}</h3>
  <p class="text-gray" style="font-size:13px">⏱️ {{act.duration}}</p>
  <p style="font-size:20px;font-weight:800;color:#667eea;margin-top:8px">₹{{act.cost}}</p>
</div>
{% endfor %}
</div>
{% endblock %}
