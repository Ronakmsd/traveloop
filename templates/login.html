{% extends 'base.html' %}
{% block content %}
<div style="max-width:420px;margin:40px auto">
  <div class="card">
    <div style="text-align:center;margin-bottom:25px"><div style="font-size:40px">✈️</div><h1>Welcome Back</h1><p class="text-gray">Login to your Traveloop account</p></div>
    <form method="POST">
      <label>Email</label><input type="email" name="email" placeholder="your@email.com" required>
      <label>Password</label><input type="password" name="password" placeholder="••••••••" required>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:16px;margin-top:5px">Login →</button>
    </form>
    <p class="text-gray mt-10" style="text-align:center">No account? <a href="/signup" style="color:#667eea;font-weight:600">Sign Up</a></p>
  </div>
</div>
{% endblock %}
